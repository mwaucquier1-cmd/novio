<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veux-tu être mi novio ? 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Veux-tu être mi novio? 💕</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmd1djB4c2VkeXB6M2szbjJuaDEzNmVzMnN4ZXAwZzJtcGIyNDdhcSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/GHFK21M0SbSy4PVSvM/giphy.gif">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Oui 💕</button>
            <button id="no-btn" onclick="handleNoClick()">Non</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="milbesos.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="script.js"></script>
</body>
</html>
